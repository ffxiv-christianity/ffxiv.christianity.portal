<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 基督教公會 | 艾歐澤亞的團契</title>
    <link rel="icon" type="image/png" href="images/Favicon.png">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;               
            background-color: #ffffff;
        }

        .entry-link {
            display: block;
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background-color: #000;
        }

        /* 後圖層 */
        .back-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/大聖堂1.jpg');
            background-size: cover;
            background-position: center;


            opacity: 0.65;                          /* 透明度與模糊感 */
            filter: blur(10px) brightness(0.8);;    /* 調整模糊，亮度 */
            transform: scale(1.1);

            z-index: 1;
        }

        /* 前圖層 */
        .front-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;                          
        }

        .front-layer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: fadeIn 2s ease-in-out;    /* 淡入動畫 */
        }

        /* fadeIn 屬性 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.05);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <a href="home.html" class="entry-link" onclick="enableMusic()">
        <div class="back-layer"></div>

        <div class="front-layer">
            <img src="images/大聖堂1.jpg" alt="FF14 基督教公會 入口大圖">
        </div>
    </a>
</body>

<script>
function enableMusic() {
    localStorage.setItem('playBgm', 'true');
    localStorage.setItem('resetMusic', 'true');
}
</script>

</html>
