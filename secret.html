<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 基督教公會 | 艾奧傑亞的團契</title>
    <link rel="stylesheet" href="css/global.css?v=260422">
    <link rel="stylesheet" href="css/secret.css?v=260422">
</head>

<body>
    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div id="side-menu" class="side-menu">
            <a href="index.html">Home</a>
            <a href="home.html">About</a>
            <a href="photos.html">Photos</a>
            <a href="secret.html" class="active">Secret</a>
        </div>
    </div>
    <audio id="bgm" loop style="display: none; visibility: hidden; position: absolute; width: 0; height: 0;">
        <source src="bgm/edit/AmazingGrace_piano.mp3" type="audio/mpeg">
    </audio>

    <div class="music-player">
        <div id="music-toggle" class="music-fab" onclick="toggleMusic()">
            <span class="icon">♪</span>
        </div>
    </div>

    <header></header>

    <main>
        <section class="secret-flex-container">
            <div class="secret-text-frame">
                <div class="content">
                    <h2>天啊！</h2>
                    <p>這裡沒有任何內容——嗎？</p>
                    <p>在此向耶穌祈禱，神蹟將為你展現……</p>
                    <div class="whisper-text">
                        <p>若你在桌前，請在此呼喚我的名字 <span class="hint-en">(Jesus)</span><span class="blinking-cursor">_</span>
                        </p>
                        <p>若你手持亞拉戈神典石裝置，請依序點擊正北、正南、正西、正東方位。</p>
                    </div>
                </div>
            </div>

            <div class="img-frame">
                <div class="img-wrapper">
                    <img src="images/主抱頭.jpg" alt="主抱頭">
                </div>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 FF14 基督教公會. All rights reserved.</p>
    </footer>

    <script src="js/menu.js"></script>
    <script>
        const secretTextCode = 'jesus';
        let inputBuffer = '';

        document.addEventListener('keydown', (e) => {
            inputBuffer += e.key.toLowerCase();
            if (inputBuffer.length > secretTextCode.length) {
                inputBuffer = inputBuffer.slice(-secretTextCode.length);
            }
            if (inputBuffer === secretTextCode) triggerSecret();
        });

        const secretTapCode = ['N', 'S', 'W', 'E'];
        let tapBuffer = [];

        document.addEventListener('touchstart', (e) => {
            let x = e.changedTouches[0].clientX;
            let y = e.changedTouches[0].clientY;
            let w = window.innerWidth;
            let h = window.innerHeight;

            let dx = x - w / 2;
            let dy = y - h / 2;
            let zone = '';

            if (Math.abs(dx) > Math.abs(dy)) {
                zone = dx < 0 ? 'W' : 'E';
            } else {
                zone = dy < 0 ? 'N' : 'S';
            }

            tapBuffer.push(zone);
            if (tapBuffer.length > secretTapCode.length) {
                tapBuffer.shift();
            }

            if (JSON.stringify(tapBuffer) === JSON.stringify(secretTapCode)) {
                triggerSecret();
            }
        }, { passive: true });

        function triggerSecret() {
            const lightOverlay = document.createElement('div');
            lightOverlay.style.position = 'fixed';
            lightOverlay.style.top = '0';
            lightOverlay.style.left = '0';
            lightOverlay.style.width = '100vw';
            lightOverlay.style.height = '100vh';
            lightOverlay.style.backgroundColor = '#ffffff';
            lightOverlay.style.zIndex = '99999';
            lightOverlay.style.opacity = '0';
            lightOverlay.style.transition = 'opacity 1.2s ease-in-out'; // 1.2秒漸變動畫
            lightOverlay.style.pointerEvents = 'none';

            document.body.appendChild(lightOverlay);

            requestAnimationFrame(() => {
                lightOverlay.style.opacity = '1';
            });

            setTimeout(() => {
                window.location.href = 'otherside.html';
            }, 1200);
        }
    </script>
</body>

</html>
